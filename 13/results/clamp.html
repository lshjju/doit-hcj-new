<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 함수</title>
  <style>
    * {
      margin:0;
      padding:0;
      box-sizing: border-box;
    }

    .heading {
      background-color: #222;
      color: #fff;
      padding: 10px;
      text-align: center;
      font-weight: bold;
      text-shadow: 2px 2px 2px #000;    
    }

    /* Do it! clamp() 함수로 글자 크기 범위 지정하기 */
    .heading h1 {
      font-size: clamp(1rem, 2vw, 2rem);
        /* 1rem은 최소 크기예요. 너무 작아지면 이 크기보다 작아지지 않아요.
     2vw는 뷰포트(화면) 너비의 2%라는 의미라,
     화면이 커질수록 폰트도 커지는 기준 값이에요.
     2rem은 최대 크기로, 아무리 화면이 커져도 이 크기를 넘어가진 않아요. */
    }
  </style>
</head>
<body>
  <div class="heading">
    <h1>CSS 함수</h1>
  </div>
</body>
</html>
