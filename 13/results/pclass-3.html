<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가상 선택자</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 20px;
    }
    .container {
      width: 300px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      text-align: center;
    }

    /* Do it! 가상 선택자를 사용해 항목 선택하기 */
    .container p:first-child {  /* .container 안에 있는 p 태그 중 첫 번째 자식 요소에 대해 배경색을 노란색(#fc2)으로 설정합니다. */
      background-color: #fc2;
    }
    .container :last-child {  /* .container 내부의 모든 요소 중에서 마지막 자식 요소에 대해 배경색을 파란색(#2cf)으로 설정합니다. */
      background-color: #2cf;
    }
    .container div:only-child {  /* .container 안에 있는 div 요소 중에서 해당 부모 안에서 유일한 자식일 때, 배경색을 연보라색(#f0c8fc)으로 설정합니다. */
      background-color: #f0c8fc;
    }
  </style>
</head>
<body>
  <div class="container">
    <p>첫 번째</p>
    <div>두 번째</div>
    <p>세 번째</p>
    <div>네 번째</div>
  </div>
  <div class="container">
    <div>혼자~</div>
  </div>
</body>
</html>
