<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 함수</title>
  <style>
    * {
      margin:0;
      padding:0;
      box-sizing: border-box;
    }
    
    /* Do it! min() 함수로 너비 지정하기 */
    .heading {
      width: min(100%, 700px);  /* 100%와 700px 중 작은 값 */      
      margin: auto;
      background-color: #222;
      color: #fff;
      padding: 10px;
      text-align: center;
      font-weight: bold;
      text-shadow: 2px 2px 2px #000;    
    }

    /* Do it! max() 함수로 글자 크기 지정하기 */
    .heading h1 {
      font-size: max(3vw, 2em);  /* 3vw, 2rem 중 큰 값 */
        /* 3vw는 화면 너비의 3%를 의미해요. 화면이 커질수록 폰트 크기도 늘어나요.
     2em은 현재 요소의 기본 폰트 크기 기준으로 2배 크기라는 뜻이에요.

     그래서 화면 크기가 작아도 폰트가 너무 작아지지 않고,
     반대로 화면이 커지면 3vw 크기가 2em보다 커질 때는 
     3vw 크기로 폰트가 커진답니다. */
    }
  </style>
</head>
<body>
  <div class="heading">
    <h1>CSS 함수 - min()</h1>
  </div>
</body>
</html>
