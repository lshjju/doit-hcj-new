<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가상 선택자</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 5px;
    }
    .item {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 20px;
    }

    /* Do it! 가상 선택자를 사용해 항목 선택하기 */
    
.container :nth-child(3) {   
  background-color: #fc2;
}
/* .container 내부에서 3번째 자식 요소에 배경색을 노란색(#fc2)으로 적용합니다. */

.container :nth-child(2n) {   
  background-color: #fc2;
}
/* .container 내부에서 짝수 번째(2, 4, 6, ...) 자식 요소들에 배경색을 노란색(#fc2)으로 적용합니다. */

.container :nth-child(2n+1) {   
  background-color: #fc2;
}
/* .container 내부에서 홀수 번째(1, 3, 5, ...) 자식 요소들에 배경색을 노란색(#fc2)으로 적용합니다. */

.container :nth-child(3n) {   
  background-color: #fc2;
}
/* .container 내부에서 3의 배수 번째(3, 6, 9, ...) 자식 요소들에 배경색을 노란색(#fc2)으로 적용합니다. */

.container :nth-child(n+4) {   
  background-color: #fc2;
}
/* .container 내부에서 4번째 자식부터 그 이후 모든 자식 요소(4, 5, 6, ...)에 배경색을 노란색(#fc2)으로 적용합니다. */

.container :nth-child(-n+4) {   
  background-color: #fc2;
}
/* .container 내부에서 1번째부터 4번째 자식 요소까지 배경색을 노란색(#fc2)으로 적용합니다. */

.container :nth-child(n+3):nth-child(-n+5) {   
  background-color: #fc2;
}
/* .container 내부에서 3번째부터 5번째 자식 요소(3, 4, 5)에만 배경색을 노란색(#fc2)으로 적용합니다. */

  </style>
</head>
<body>
  <div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
    <div class="item">7</div>
    <div class="item">8</div>
  </div>
</body>
</html>
